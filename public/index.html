<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PeerCode</title>
    <style>
      :root {
        --bg: #0f1115; --panel: #181b22; --line: #272b34;
        --txt: #e6e8ec; --muted: #8b93a1; --acc: #6ea8fe; --ok: #4ade80;
        --warn: #fbbf24; --bad: #f87171; --purple: #c4b5fd;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0; background: var(--bg); color: var(--txt);
        font: 13px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace;
      }
      header {
        padding: 10px 16px; border-bottom: 1px solid var(--line);
        display: flex; gap: 16px; align-items: center; flex-wrap: wrap;
      }
      header h1 { font-size: 15px; margin: 0; color: var(--acc); }
      header .muted { color: var(--muted); }
      input, select, textarea, button {
        background: #0c0e12; color: var(--txt); border: 1px solid var(--line);
        border-radius: 6px; padding: 6px 8px; font: inherit;
      }
      button { background: #20242d; cursor: pointer; }
      button:hover { border-color: var(--acc); }
      button.primary { background: var(--acc); color: #07101f; border-color: var(--acc); }
      button:disabled { opacity: .5; cursor: default; }
      select { min-width: 200px; }

      main { display: grid; grid-template-columns: 320px 1fr 1fr; gap: 12px; padding: 12px; align-items: start; }
      .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 12px; }
      .panel h2 { font-size: 12px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin: 0 0 10px; }
      .row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
      .row > * { flex: 1; min-width: 0; }
      .muted { color: var(--muted); }

      /* Setup */
      .member { display: flex; gap: 6px; margin-bottom: 6px; }
      .member input { flex: 1; }
      .member .role { max-width: 110px; }

      /* Roadmap tree */
      .tree { position: relative; }
      .phase { margin-bottom: 14px; }
      .phase-head { display: flex; align-items: center; gap: 8px; font-weight: 600; }
      .phase-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--acc); flex: none; }
      .phase-body { margin-left: 4px; border-left: 2px solid var(--line); padding-left: 14px; margin-top: 6px; }
      .node { position: relative; padding: 6px 8px; margin: 6px 0; background: #0c0e12; border: 1px solid var(--line); border-radius: 8px; }
      .node::before { content: ""; position: absolute; left: -15px; top: 16px; width: 12px; height: 1px; background: var(--line); }
      .node .t { font-size: 12px; }
      .node .meta { color: var(--muted); font-size: 10px; margin-top: 2px; }
      .deps { color: var(--purple); }

      /* Kanban */
      .kanban { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
      .col h3 { font-size: 10px; color: var(--muted); margin: 0 0 6px; text-transform: uppercase; letter-spacing: .05em; }
      .col { background: #0c0e12; border: 1px solid var(--line); border-radius: 8px; padding: 8px; min-height: 80px; }
      .card { background: #181b22; border: 1px solid var(--line); border-radius: 6px; padding: 6px; margin-bottom: 6px; font-size: 11px; }
      .card .who { color: var(--acc); font-size: 10px; }

      /* Decisions */
      .decisions { grid-column: 1 / -1; }
      .decisions-grid { display: grid; grid-template-columns: 1.4fr 1fr; gap: 12px; }
      .decision { border-left: 3px solid var(--line); padding: 6px 10px; margin-bottom: 8px; background: #0c0e12; border-radius: 0 6px 6px 0; }
      .decision.discovery { border-color: var(--acc); }
      .decision.contract_change { border-color: var(--warn); }
      .decision.dependency_found { border-color: var(--purple); }
      .decision.scope_change { border-color: var(--bad); }
      .decision .h { font-size: 11px; }
      .decision .who { color: var(--acc); }
      .decision .body { font-size: 12px; margin-top: 2px; }
      .decision .when { color: var(--muted); font-size: 10px; }
      .debate { border: 1px solid var(--line); border-radius: 8px; padding: 8px; margin-bottom: 8px; }
      .debate .msg { font-size: 11px; padding: 3px 0; border-top: 1px dashed var(--line); }
      .debate .msg .s { color: var(--purple); }
      .badge { display: inline-block; padding: 0 6px; border-radius: 4px; font-size: 10px; background: #20242d; color: var(--muted); }
      .badge.ok { color: var(--ok); } .badge.warn { color: var(--warn); } .badge.bad { color: var(--bad); }
      .feed { max-height: 200px; overflow: auto; font-size: 10px; color: var(--muted); }
      .feed .e { padding: 1px 0; }
      .editing { font-size: 10px; color: var(--warn); margin-bottom: 6px; }
      .empty { color: var(--muted); font-style: italic; }
    </style>
  </head>
  <body>
    <header>
      <h1>PeerCode</h1>
      <span class="muted">project</span>
      <select id="projectSel"></select>
      <button id="refreshBtn">refresh</button>
      <span id="status" class="muted"></span>
    </header>

    <main>
      <!-- SETUP: project + team input only -->
      <section class="panel" id="setup">
        <h2>New project</h2>
        <div class="row"><input id="pName" placeholder="project name" /></div>
        <div class="row"><textarea id="pDesc" rows="4" placeholder="describe the project goal…"></textarea></div>
        <h2 style="margin-top:6px">Team members</h2>
        <div id="members"></div>
        <div class="row"><button id="addMember">+ add member</button></div>
        <div class="row">
          <button class="primary" id="createBtn">create</button>
          <button id="decomposeBtn">plan with Claude</button>
        </div>
        <p class="muted" id="setupHint" style="font-size:11px">
          Create a project, then “plan with Claude” to generate the roadmap.
        </p>
      </section>

      <!-- ROADMAP TREE -->
      <section class="panel">
        <h2>Roadmap</h2>
        <div id="editing" class="editing"></div>
        <div id="tree" class="tree"><span class="empty">no project loaded</span></div>
      </section>

      <!-- KANBAN -->
      <section class="panel">
        <h2>Board — progress</h2>
        <div id="kanban" class="kanban"></div>
      </section>

      <!-- AGENT DECISIONS (read-only) -->
      <section class="panel decisions">
        <h2>How the agents decided</h2>
        <div class="decisions-grid">
          <div>
            <h2>Context decisions &amp; debates</h2>
            <div id="decisions"><span class="empty">no agent activity yet</span></div>
          </div>
          <div>
            <h2>Live activity</h2>
            <div id="feed" class="feed"></div>
          </div>
        </div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
