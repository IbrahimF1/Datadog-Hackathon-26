<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PeerCode — test console</title>
    <style>
      :root {
        --bg: #0f1115; --panel: #181b22; --line: #272b34;
        --txt: #e6e8ec; --muted: #8b93a1; --acc: #6ea8fe; --ok: #4ade80;
        --warn: #fbbf24; --bad: #f87171;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0; background: var(--bg); color: var(--txt);
        font: 13px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace;
      }
      header {
        padding: 10px 16px; border-bottom: 1px solid var(--line);
        display: flex; gap: 16px; align-items: center; flex-wrap: wrap;
      }
      header h1 { font-size: 15px; margin: 0; color: var(--acc); }
      header label { color: var(--muted); }
      input, select, textarea, button {
        background: #0c0e12; color: var(--txt); border: 1px solid var(--line);
        border-radius: 6px; padding: 6px 8px; font: inherit;
      }
      button { background: #20242d; cursor: pointer; }
      button:hover { border-color: var(--acc); }
      button.primary { background: var(--acc); color: #07101f; border-color: var(--acc); }
      main { display: grid; grid-template-columns: 1.1fr 1fr 0.9fr; gap: 12px; padding: 12px; }
      .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 12px; }
      .panel h2 { font-size: 12px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin: 0 0 8px; }
      .row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 6px; }
      .row > * { flex: 1; min-width: 0; }
      .kanban { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
      .col h3 { font-size: 10px; color: var(--muted); margin: 0 0 4px; text-transform: uppercase; }
      .card { background: #0c0e12; border: 1px solid var(--line); border-radius: 6px; padding: 6px; margin-bottom: 6px; font-size: 11px; }
      .card .a { color: var(--acc); }
      .phase { border-left: 2px solid var(--acc); padding-left: 8px; margin-bottom: 10px; }
      .lock, .delta, .debate { border: 1px solid var(--line); border-radius: 6px; padding: 6px; margin-bottom: 6px; font-size: 11px; }
      .blocking { border-color: var(--bad); }
      .feed { height: 280px; overflow: auto; background: #0c0e12; border-radius: 6px; padding: 8px; font-size: 11px; }
      .feed .e { margin-bottom: 4px; }
      .tag { display: inline-block; padding: 0 5px; border-radius: 4px; background: #20242d; color: var(--muted); font-size: 10px; }
      .muted { color: var(--muted); }
      .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
      pre { white-space: pre-wrap; word-break: break-word; margin: 0; }
      a.link { color: var(--acc); cursor: pointer; }
    </style>
  </head>
  <body>
    <header>
      <h1>PeerCode</h1>
      <span><label>session</label> <input id="sessionId" value="alice" style="width:90px" /></span>
      <span><label>project</label>
        <select id="projectSel" style="min-width:220px"></select>
      </span>
      <button id="refreshBtn">refresh</button>
      <span id="status" class="muted"></span>
    </header>

    <main>
      <!-- LEFT: project + roadmap + kanban -->
      <section class="panel" style="grid-row: span 2">
        <h2>Project</h2>
        <div class="row"><input id="pName" placeholder="project name" /></div>
        <div class="row"><textarea id="pDesc" placeholder="project description" rows="2"></textarea></div>
        <div class="row"><input id="pTeam" placeholder='team e.g. Alice:backend:node,sql; Bob:frontend:react' /></div>
        <div class="row">
          <button class="primary" id="createBtn">create project</button>
          <button id="decomposeBtn">decompose (Claude)</button>
        </div>
        <div id="questions"></div>

        <h2 style="margin-top:14px">Roadmap</h2>
        <div id="roadmap" class="muted">no project loaded</div>

        <h2 style="margin-top:14px">Kanban</h2>
        <div id="kanban" class="kanban"></div>
      </section>

      <!-- MIDDLE: locks + deltas + debates -->
      <section class="panel">
        <h2>File locks</h2>
        <div class="row">
          <input id="lockPath" placeholder="src/auth/login.ts" />
          <input id="lockStart" placeholder="start" style="max-width:70px" />
          <input id="lockEnd" placeholder="end" style="max-width:70px" />
        </div>
        <div class="row">
          <input id="lockReason" placeholder="reason" />
          <button id="lockBtn">acquire</button>
        </div>
        <div id="locks" class="muted">—</div>
      </section>

      <section class="panel">
        <h2>Context deltas</h2>
        <div class="row">
          <select id="deltaType">
            <option>discovery</option><option>contract_change</option>
            <option>dependency_found</option><option>scope_change</option>
          </select>
          <select id="deltaSev"><option>info</option><option>warning</option><option>blocking</option></select>
        </div>
        <div class="row"><input id="deltaContent" placeholder="what changed" /></div>
        <div class="row"><button id="deltaBtn">push delta</button></div>
        <div id="deltas" class="muted">—</div>
      </section>

      <!-- RIGHT: debates + sync + feed -->
      <section class="panel" style="grid-row: span 2">
        <h2>Debates</h2>
        <div class="row"><input id="debatePos" placeholder="your position" /></div>
        <div class="row">
          <input id="debateDelta" placeholder="conflicting deltaId (optional)" />
          <button id="debateBtn">start</button>
        </div>
        <div id="debates" class="muted">—</div>

        <h2 style="margin-top:14px">Sync (peer-progress)</h2>
        <div class="row">
          <button id="syncStart">start sync</button>
          <input id="syncSha" placeholder="commit sha" />
          <button id="syncDone">complete</button>
        </div>
        <div id="syncOut" class="muted">—</div>

        <h2 style="margin-top:14px">Live event feed (WebSocket)</h2>
        <div id="feed" class="feed"></div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
